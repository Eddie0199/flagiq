<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WildMoustacheGames</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1d4ed8 0%, #0b74ff 35%, #0f172a 100%);
        color: #fff;
      }
      .wrap { max-width: 980px; margin: 0 auto; padding: 48px 20px 56px; }
      .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
      .logo {
        width: 56px; height: 56px; border-radius: 16px;
        background: rgba(255,255,255,0.18); display: grid; place-items: center;
        box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      }
      .logo img { width: 42px; height: 42px; border-radius: 10px; }
      h1 { margin: 0; font-size: clamp(30px, 6vw, 46px); }
      .sub { margin: 0 0 28px; color: rgba(255,255,255,0.85); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .card {
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.58);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 180px;
      }
      .card h2 { margin: 0; font-size: 24px; }
      .card p { margin: 0; color: rgba(255,255,255,0.82); }
      .btn {
        margin-top: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 10px 16px;
        text-decoration: none;
        font-weight: 700;
      }
      .btn.primary { background: #fff; color: #0f172a; }
      .btn.disabled { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.62); cursor: default; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="brand">
        <div class="logo"><img src="/icon-512.png" alt="WildMoustacheGames" /></div>
        <div>
          <h1>WildMoustacheGames</h1>
          <p class="sub">Pick a game and jump right in.</p>
        </div>
      </section>

      <section class="grid" aria-label="Games list">
        <article class="card">
          <h2>FlagIQ</h2>
          <p>Train your flag knowledge with fast rounds, progression, and unlockable content.</p>
          <a class="btn primary" href="/flagiq">Play FlagIQ</a>
        </article>
        <article class="card">
          <h2>Coming Soon</h2>
          <p>Future games will be published under this hub at dedicated paths.</p>
          <span class="btn disabled">/future-game</span>
        </article>
      </section>
    </main>
  </body>
</html>
